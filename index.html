<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP Creators — Internal Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --flame: #FF5200; --deep: #0A0A0A; --smoke: rgba(255,255,255,0.5); --ghost: rgba(255,255,255,0.08); }
        body { background: var(--deep); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        .form-glass { width: 100%; max-width: 400px; padding: 40px; border-radius: 24px; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .nav-brand { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; text-decoration: none; }
        .nav-logo { height: 32px; width: 32px; border-radius: 8px; background: #fff; object-fit: contain; }
        .nav-tag { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--smoke); font-weight: 600; border: 1px solid rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 100px; }
        .f-input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; margin-bottom: 16px; text-align: center; outline: none; }
        .f-submit { width: 100%; padding: 16px; border-radius: 100px; border: none; background: var(--flame); color: #fff; font-weight: 600; cursor: pointer; text-transform: uppercase; }
        .links { display: none; flex-direction: column; gap: 12px; margin-top: 24px; text-align: left; }
        .links.show { display: flex; }
        .link-card { padding: 16px; background: rgba(255,255,255,0.05); border-radius: 12px; text-decoration: none; color: #fff; border: 1px solid transparent; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .link-card:hover { border-color: var(--flame); background: rgba(255,82,0,0.05); }
        .error { color: #ff4444; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
        <nav style="position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:14px 0;background:rgba(10,10,10,0.92);backdrop-filter:blur(40px);border-bottom:1px solid rgba(255,255,255,0.04);">
            <a href="index.html" style="color:#FF5200;text-decoration:none;margin:0 18px;font-weight:600;">Home</a>
            <a href="dashboard.html" style="color:#fff;text-decoration:none;margin:0 18px;font-weight:600;">Dashboard</a>
            <a href="all-campaigns.html" style="color:#fff;text-decoration:none;margin:0 18px;font-weight:600;">All Campaigns</a>
            <a href="admin-login.html" style="color:#fff;text-decoration:none;margin:0 18px;font-weight:600;">Admin Login</a>
            <a href="admin.html" style="color:#fff;text-decoration:none;margin:0 18px;font-weight:600;">Admin Control</a>
            <a href="pop-studio.html" style="color:#fff;text-decoration:none;margin:0 18px;font-weight:600;">POP Studio</a>
        </nav>
        <div style="height:56px;"></div>
        <div class="form-glass">
        <div class="nav-brand">
            <img src="pop_bw_logo_new.svg" alt="POP Logo" class="nav-logo">
            <span class="nav-tag">Creators</span>
        </div>
        <div id="gateForm">
            <input type="password" class="f-input" id="gatePassword" placeholder="Enter Access Code">
            <button class="f-submit" onclick="checkAccess()">Unlock Access</button>
            <div class="error" id="gateError">Incorrect code.</div>
        </div>
        <div class="links" id="gateLinks">
            <a href="pop-studio.html" class="link-card">Public Landing <span>→</span></a>
            <a href="dashboard.html" class="link-card">Creator Dashboard <span>→</span></a>
            <a href="admin-login.html" class="link-card">Admin Gateway <span>→</span></a>
        </div>
    </div>

    <script>
        const ACCESS_CODE = 'popstudio2026';
        function checkAccess() {
            const val = document.getElementById('gatePassword').value;
            if (val === ACCESS_CODE) {
                document.getElementById('gateForm').style.display = 'none';
                document.getElementById('gateLinks').classList.add('show');
                localStorage.setItem('pop_access', 'granted');
            } else {
                document.getElementById('gateError').style.display = 'block';
            }
        }
        if (localStorage.getItem('pop_access') === 'granted') {
            document.getElementById('gateForm').style.display = 'none';
            document.getElementById('gateLinks').classList.add('show');
        }
    </script>
</body>
</html>
