<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --flame: #FF5200; --ember: #FF7A33; --honey: #FFB547;
      --deep: #0A0A0A; --night: #111111; --slab: #1A1A1A;
      --smoke: rgba(255,255,255,0.5); --ash: rgba(255,255,255,0.25);
      --ghost: rgba(255,255,255,0.08); --glass: rgba(255,255,255,0.04);
      --glow: rgba(255,82,0,0.35);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--deep);color:#fff;font-family:'Outfit',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}

    /* ── Nav ── */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:rgba(10,10,10,0.92);backdrop-filter:blur(40px);border-bottom:1px solid rgba(255,255,255,0.04);transition:all 0.3s}
    nav.scrolled{padding:10px 40px;box-shadow:0 4px 32px rgba(0,0,0,0.3)}
    .nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none}
    .nav-logo{height:32px;width:32px;border-radius:8px;object-fit:cover;border:1px solid rgba(255,255,255,0.1);background:#fff}
    .nav-tag{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--smoke);font-weight:600;border:1px solid rgba(255,255,255,0.1);padding:4px 10px;border-radius:100px}

    /* ── Page ── */
    .contact-container{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:120px 20px 60px}
    .contact-box{background:var(--slab);border-radius:24px;border:1px solid rgba(255,255,255,0.08);padding:48px 40px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.18);display:flex;flex-direction:column;align-items:center;gap:32px}
    .contact-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;margin-bottom:8px;text-align:center}
    .contact-desc{color:var(--smoke);font-size:16px;text-align:center;margin-bottom:16px}
    .contact-link{display:flex;align-items:center;gap:12px;font-size:16px;color:var(--flame);text-decoration:none;font-weight:500;margin-bottom:8px;transition:color 0.2s}
    .contact-link:hover{color:var(--honey)}
    .contact-email{color:#fff;font-size:16px;font-weight:500;background:rgba(255,255,255,0.03);border-radius:12px;padding:12px 20px;margin-bottom:8px;text-align:center;word-break:break-all}
    .contact-social{display:flex;gap:20px;justify-content:center;margin-top:12px}
    .contact-social a{color:var(--flame);font-size:22px;transition:color 0.2s;text-decoration:none}
    .contact-social a:hover{color:var(--honey)}

    @media(max-width:600px){
      nav{padding:12px 20px}
      .contact-box{padding:32px 20px}
      .contact-title{font-size:26px}
    }

    /* ── Footer ── */
    footer{padding:40px 20px 24px;border-top:1px solid rgba(255,255,255,0.04);display:flex;justify-content:center;align-items:center;flex-direction:column;gap:12px}
    .ft-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;letter-spacing:0.02em}
    .ft-links{display:flex;gap:28px;flex-wrap:wrap;justify-content:center}
    .ft-links a{font-size:13px;color:var(--smoke);text-decoration:none;transition:color 0.2s;font-weight:300}
    .ft-links a:hover{color:var(--flame)}
    .ft-copy{font-size:11px;color:var(--ash)}
  </style>
</head>
