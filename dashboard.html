<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP Studio — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --flame: #FF5200; --deep: #0A0A0A; --night: #111111; --smoke: rgba(255,255,255,0.5); --ghost: rgba(255,255,255,0.08); }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--deep);color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;}
        
        /* Nav */
        nav{display:flex;align-items:center;justify-content:space-between;padding:16px 5%;background:rgba(10,10,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--ghost);position:sticky;top:0;z-index:100;}
        .nav-user{display:flex;align-items:center;gap:12px;}
        .avatar{width:36px;height:36px;border-radius:50%;background:var(--flame);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;}
        .logout-btn{background:none;border:1px solid var(--ghost);color:var(--smoke);padding:6px 12px;border-radius:100px;cursor:pointer;font-size:10px;text-transform:uppercase;}

        /* Grid */
        .container{max-width:1100px;margin:0 auto;padding:60px 5%;}
        .s-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--flame);margin-bottom:24px;display:block;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1px;background:var(--ghost);border-radius:20px;overflow:hidden;margin-bottom:60px;}
        .stat-card{background:var(--night);padding:30px;text-align:left;}
        .stat-val{font-family:'Playfair Display',serif;font-size:40px;margin-bottom:4px;display:block;}
        .stat-lab{font-size:11px;color:var(--smoke);text-transform:uppercase;letter-spacing:0.1em;}

        /* Submissions */
        .camp-card{background:var(--night);padding:32px;border-radius:20px;border:1px solid var(--ghost);margin-bottom:20px;}
        .c-title{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px;}
        .status{display:inline-block;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:700;background:rgba(255,82,0,0.1);color:var(--flame);text-transform:uppercase;margin-bottom:16px;}
    </style>
</head>
<body>
    <nav style="position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:14px 0;background:rgba(10,10,10,0.92);backdrop-filter:blur(40px);border-bottom:1px solid rgba(255,255,255,0.04);">
        <a href="index.html" style="color:#fff;text-decoration:none;margin:0 18px;font-weight:600;">Home</a>
        <a href="dashboard.html" style="color:#FF5200;text-decoration:none;margin:0 18px;font-weight:600;">Dashboard</a>
        <a href="all-campaigns.html" style="color:#fff;text-decoration:none;margin:0 18px;font-weight:600;">All Campaigns</a>
        <a href="admin-login.html" style="color:#fff;text-decoration:none;margin:0 18px;font-weight:600;">Admin Login</a>
        <a href="admin.html" style="color:#fff;text-decoration:none;margin:0 18px;font-weight:600;">Admin Control</a>
        <a href="pop-studio.html" style="color:#fff;text-decoration:none;margin:0 18px;font-weight:600;">POP Studio</a>
    </nav>
    <div style="height:56px;"></div>
    </span>
  </a>

  <div class="nav-user">
    <div class="avatar" id="userAvatar">--</div>
    <span id="userName" style="font-size:14px; color:var(--smoke); font-weight: 400;">Loading...</span>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</nav>
</nav>

<div class="container">
    <span class="s-label">Performance</span>
    <div class="stats-grid">
        <div class="stat-card"><span class="stat-val" id="statCamps">0</span><span class="stat-lab">Active</span></div>
        <div class="stat-card"><span class="stat-val" id="statViews">0</span><span class="stat-lab">Views</span></div>
        <div class="stat-card"><span class="stat-val" id="statEarned" style="color:var(--flame)">₹0</span><span class="stat-lab">Earned</span></div>
        <div class="stat-card"><span class="stat-val" id="statPending">₹0</span><span class="stat-lab">Pending</span></div>
    </div>

    <span class="s-label">Your Submissions</span>
    <div class="camp-card">
        <span class="status">Awaiting Submission</span>
        <div class="c-title">The POPcard Rebrand</div>
        <p style="color:var(--smoke);font-size:14px;margin-bottom:24px;line-height:1.6">Post your Reel and paste the link below to begin tracking.</p>
        <div style="display:flex;gap:10px;">
            <input type="text" placeholder="Instagram URL..." style="flex:1;background:#000;border:1px solid #333;padding:14px;border-radius:100px;color:#fff;outline:none;">
            <button style="background:var(--flame);color:#fff;border:none;padding:0 30px;border-radius:100px;font-weight:600;font-size:12px;cursor:pointer;">SUBMIT</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. SETTINGS - We use 'popSupabase' to avoid the "already declared" error
    const popUrl = 'https://fxuinuxyjhjxygdhskfn.supabase.co';
    const popKey = 'sb_publishable_Mgh-fEqB3IVF4iTvV0-rjw_GkfftY_5';
    let popClient;

    async function initDashboard() {
        console.log("Initializing Dashboard...");
        
        try {
            // 2. Initialize the client with a unique name
            if (!popClient) {
                popClient = window.supabase.createClient(popUrl, popKey);
            }

            // 3. Get User Session
            const { data: { user }, error } = await popClient.auth.getUser();

            if (error || !user) {
                console.error("Auth failed:", error);
                window.location.href = 'pop-studio.html';
                return;
            }

            // 4. Update the Name & Avatar
            const fullName = user.user_metadata.full_name || user.email.split('@')[0];
            console.log("Logged in as:", fullName);

            document.getElementById('userName').textContent = fullName;
            
            const initials = fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            document.getElementById('userAvatar').textContent = initials;

            // 5. Sync to Database (Upsert prevents duplicate errors)
            await popClient.from('creators').upsert({ 
                id: user.id, 
                full_name: fullName, 
                email: user.email 
            });

        } catch (err) {
            console.error("Critical Error:", err);
            document.getElementById('userName').textContent = "Session Error";
        }
    }

    async function logout() {
        if (popClient) await popClient.auth.signOut();
        window.location.href = 'pop-studio.html';
    }

    // Start the process
    initDashboard();
</script>
</body>
</html>
